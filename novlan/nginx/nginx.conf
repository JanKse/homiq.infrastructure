events {
    worker_connections 1024;
}

http {
    # === SSL Settings ===
    ssl_certificate     /etc/nginx/certs/home.crt;
    ssl_certificate_key /etc/nginx/certs/home.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # === Common proxy headers ===
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # === Redirect HTTP -> HTTPS ===
    server {
        listen 80 default_server;
        return 301 https://$host$request_uri;
    }

    # === HOME ASSISTANT ===
    server {
        listen 443 ssl;
        server_name ha.local;

        location / {
            proxy_pass http://homeassistant:8123;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # === NODE-RED ===
    server {
        listen 443 ssl;
        server_name nodered.local;

        location / {
            proxy_pass http://nodered:1880;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # === GRAFANA ===
    server {
        listen 443 ssl;
        server_name grafana.local;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # === UPTIME KUMA ===
    server {
        listen 443 ssl;
        server_name kuma.local;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # === ZIGBEE2MQTT ===
    server {
        listen 443 ssl;
        server_name z2mqtt.local;

        location / {
            proxy_pass http://zigbee2mqtt:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # === ADGUARD HOME ===
    server {
        listen 443 ssl;
        server_name adguard.local;

        location / {
            proxy_pass http://adguard:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # === PORTAINER ===
    server {
        listen 443 ssl;
        server_name portainer.local;

        location / {
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

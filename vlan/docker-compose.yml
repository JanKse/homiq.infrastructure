services:
  # === REVERSE PROXY ===
  nginx:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - homeassistant
      - nodered
      - grafana
      - uptime-kuma
      - zigbee2mqtt
      - adguard
      - portainer
    networks:
      - home-net

  # === HOME ASSISTANT ===
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: always
    privileged: true
    volumes:
      - ./homeassistant/config:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - home-net

  # === NODE-RED ===
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    restart: always
    user: "1000:1000"
    volumes:
      - ./nodered/data:/data
    networks:
      - home-net

  # === MOSQUITTO ===
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - home-net

  # === ZIGBEE2MQTT ===
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: zigbee2mqtt
    restart: always
    volumes:
      - ./zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    devices:
      - ${ZIGBEE_DEVICE}:/dev/ttyUSB0
    depends_on:
      - mosquitto
    networks:
      - home-net

  # === GRAFANA ===
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    user: "472:472"
    volumes:
      - ./grafana/data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://grafana${DOMAIN_SUFFIX}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - home-net

  # === INFLUXDB ===
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: always
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=homelab
      - DOCKER_INFLUXDB_INIT_BUCKET=homeassistant
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    networks:
      - home-net

  # === UPTIME KUMA ===
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always
    volumes:
      - ./uptime-kuma/data:/app/data
    networks:
      - home-net

  # === ADGUARD HOME (DNS) ===
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: always
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
    networks:
      - home-net

  # === PORTAINER ===
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - home-net

  # === ESPHOME (WiFi IoT firmware management) ===
  esphome:
    image: ghcr.io/esphome/esphome:latest
    container_name: esphome
    restart: always
    volumes:
      - ./esphome/config:/config
    network_mode: host
    # host mode potrebný pre mDNS discovery IoT zariadení na eth1 (VLAN 20)

  # === WIREGUARD VPN ===
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Bratislava
      - SERVERURL=${WG_SERVERURL}
      - SERVERPORT=${WG_SERVERPORT}
      - PEERS=${WG_PEERS}
      - PEERDNS=${HOST_IP}
      - INTERNAL_SUBNET=${VLAN_VPN_SUBNET}
    ports:
      - "${WG_SERVERPORT}:51820/udp"
    volumes:
      - ./wireguard/config:/config
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: always
    networks:
      - home-net

networks:
  home-net:
    driver: bridge
